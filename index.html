<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Potato_Builders // Terminal Management Suite</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --glass-bg: rgba(10, 25, 50, 0.5);
            --glass-border: rgba(0, 150, 255, 0.2);
            --neon-blue: #0096ff;
            --neon-glow: 0 0 15px rgba(0, 150, 255, 0.6);
            --text-main: #e0f2fe;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #0a1128 0%, #020617 100%);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Aero-Glass Global Header */
        header {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: var(--neon-glow);
        }

        nav button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 8px 16px;
            margin-left: 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }

        nav button:hover, nav button.active {
            background: var(--neon-blue);
            color: #000;
            box-shadow: var(--neon-glow);
            border-color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* View Management Layout */
        .view-panel {
            display: none;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .view-panel.active {
            display: block;
        }

        h2 {
            margin-top: 0;
            border-bottom: 2px solid var(--glass-border);
            padding-bottom: 10px;
            letter-spacing: 1px;
        }

        /* Optimization Panel UI Specifics */
        .flex-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 768px) {
            .flex-grid { grid-template-columns: 1fr; }
        }

        .control-box, .output-box {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            color: #93c5fd;
        }

        input[type="range"], select, input[type="text"] {
            width: 100%;
            padding: 10px;
            background: #0f172a;
            border: 1px solid var(--glass-border);
            color: #fff;
            border-radius: 6px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--neon-blue);
            box-shadow: var(--neon-glow);
        }

        .budget-display {
            font-size: 28px;
            font-weight: bold;
            color: #fff;
            text-shadow: var(--neon-glow);
            margin-bottom: 15px;
        }

        /* Meter System Layout */
        .meter-container {
            background: #020617;
            border: 1px solid #1e293b;
            border-radius: 6px;
            height: 24px;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .meter-fill {
            height: 100%;
            width: 50%;
            background: var(--neon-blue);
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1), background-color 0.4s ease;
        }

        .meter-text {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: bold; color: #fff;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
        }

        /* Build Specs Cards */
        .spec-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .spec-label { color: #94a3b8; font-size: 13px; }
        .spec-value { color: #fff; font-weight: 600; font-size: 14px; }

        /* Marketplace Cards Structure */
        .market-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .market-card {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            transition: transform 0.2s ease;
        }

        .market-card:hover {
            transform: translateY(-4px);
            border-color: var(--neon-blue);
        }

        .market-card img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 6px;
            background: #020617;
        }

        .market-card h3 { margin: 10px 0 5px; font-size: 16px; }
        .market-card p { margin: 0 0 12px; color: var(--neon-blue); font-weight: bold; }

        .btn-action {
            width: 100%;
            background: var(--neon-blue);
            color: #000;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 12px;
        }

        .btn-action:hover {
            box-shadow: var(--neon-glow);
            background: #fff;
        }

        /* Cart Floating Layout */
        .cart-dropdown {
            background: rgba(2, 6, 23, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }
    </script>
</head>
<body>

    <header>
        <div class="brand-title">POTATO_BUILDERS // OS</div>
        <nav>
            <button onclick="switchView('optimization-tab')" id="nav-optimization-tab" class="active">Optimization Engine</button>
            <button onclick="switchView('marketplace-tab')" id="nav-marketplace-tab">Marketplace Hardware</button>
        </nav>
    </header>

    <div class="container">

        <section id="optimization-tab" class="view-panel active">
            <h2>Hardware Scaler & Optimization Framework</h2>
            <div class="flex-grid">
                
                <div class="control-box">
                    <label for="budget-slider">Target Budget Allocation (INR)</label>
                    <div class="budget-display" id="budget-val">₹30,000</div>
                    <input type="range" id="budget-slider" min="30000" max="100000" step="1000" value="30000" oninput="runOptimizationEngine()">

                    <label for="role-select">Target Workload Profile</label>
                    <select id="role-select" onchange="runOptimizationEngine()">
                        <option value="Gaming">Gaming / High FPS Focus</option>
                        <option value="Editing">Editing / Production Rendering</option>
                        <option value="Study">Academic Study / Development</option>
                    </select>

                    <div style="margin-top:15px;">
                        <input type="checkbox" id="ram-balance-toggle" onchange="runOptimizationEngine()" checked>
                        <label for="ram-balance-toggle" style="display:inline; margin-left:8px; font-size:12px;">Enforce Balanced Dual-Channel Configuration</label>
                    </div>
                </div>

                <div class="output-box">
                    <label>System Stability Profile</label>
                    <div class="meter-container">
                        <div class="meter-fill" id="bottleneck-meter"></div>
                        <div class="meter-text" id="bottleneck-text">Evaluating Matrix...</div>
                    </div>

                    <label>Optimized Component Blueprint Configuration</label>
                    <div id="component-specs-output">
                        </div>

                    <label style="margin-top:20px;">Dynamic Benchmark Target Frame Rates</label>
                    <div class="spec-item">
                        <span class="spec-label">Tomb Raider (2013) - 1080p High</span>
                        <span class="spec-value" id="fps-tomb" style="color:#00cc44;">-- FPS</span>
                    </div>
                    <div class="spec-item">
                        <span class="spec-label">Crysis 3 Remastered - 1080p Medium</span>
                        <span class="spec-value" id="fps-crysis" style="color:#ffaa00;">-- FPS</span>
                    </div>
                </div>

            </div>
        </section>

        <section id="marketplace-tab" class="view-panel">
            <h2>Hardware Supply Pipeline Terminal</h2>
            
            <label for="market-search">Search Inventory</label>
            <input type="text" id="market-search" placeholder="Type components name to filter live matrix...">
            
            <div class="market-grid" id="market-grid-display">
                </div>

            <div class="cart-dropdown">
                <h3 style="margin-top:0; border-bottom:1px solid #1e293b; padding-bottom:8px;">Active Procurement Buffer (Cart)</h3>
                <div id="cart-items-list" style="font-size:14px; color:#cbd5e1;">Your pipeline is currently empty.</div>
                <div style="display:flex; justify-content:space-between; margin-top:15px; font-weight:bold; font-size:16px; border-top:1px solid #1e293b; padding-top:10px;">
                    <span>Invoice Total Cost:</span>
                    <span id="cart-total-display" style="color:var(--neon-blue)">₹0</span>
                </div>
                <button class="btn-action" style="margin-top:15px; background:#00cc44;" onclick="checkoutTerminal()">Initiate Order Verification</button>
            </div>
        </section>

    </div>

    <script>
        // ==========================================
        // FIREBASE DATABASE CORE STORAGE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "YOUR_FIREBASE_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_ID",
            appId: "YOUR_APP_ID"
        };
        
        // Initialize Firebase safely
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Global Application Runtime States
        let cart = [];
        let searchTimeout; // Used for search input debouncer timing execution
        
        // OPTIMIZATION 1: Local Data Array Cache (Stops Redundant Firebase Read Pulls)
        let localMarketItemsCache = [
            { id: "cpu_i5", title: "Intel Core i5 Processor Node", price: 7500, stocks: 4, img: "https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?w=400" },
            { id: "cpu_i7", title: "Intel Core i7 Engine Block", price: 14000, stocks: 2, img: "https://images.unsplash.com/photo-1591799264318-7e6ef8ddb7ea?w=400" },
            { id: "gpu_rx580", title: "AMD Radeon RX 580 (8GB VRAM)", price: 8500, stocks: 5, img: "https://images.unsplash.com/photo-1591488320449-011701bb6704?w=400" },
            { id: "ram_ddr4", title: "Crucial 8GB DDR4 RAM Stick", price: 2200, stocks: 12, img: "https://images.unsplash.com/photo-1562976540-1502c2145186?w=400" }
        ];

        // Fetch updates from database ONCE on startup to merge with local cache arrays
        function syncDatabaseCatalog() {
            database.ref('marketplace/items').once('value', (snapshot) => {
                let dbData = snapshot.val();
                if (dbData) {
                    // Convert Firebase map object to our active array format if populated
                    localMarketItemsCache = Object.keys(dbData).map(key => ({ id: key, ...dbData[key] }));
                    renderMarketplace(localMarketItemsCache);
                }
            });
        }

        // View Nav Switcher
        function switchView(viewId) {
            document.querySelectorAll('.view-panel').forEach(panel => panel.classList.remove('active'));
            document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(viewId).classList.add('active');
            document.getElementById(`nav-${viewId}`).classList.add('active');
        }

        // ==========================================
        // TAB 1 ENGINE LOGIC: OPTIMIZATION CALCULATIONS
        // ==========================================
        function runOptimizationEngine() {
            let budget = parseInt(document.getElementById('budget-slider').value);
            let role = document.getElementById('role-select').value;
            let enforceRamRule = document.getElementById('ram-balance-toggle').checked;

            document.getElementById('budget-val').innerText = `₹${budget.toLocaleString('en-IN')}`;

            let cpuTier = 1; 
            let gpuTier = 1; 
            let ramAmount = 8; 
            let storageSpec = "256GB M.2 SATA SSD";

            if (budget >= 45000) { cpuTier = 2; gpuTier = 2; ramAmount = 12; storageSpec = "512GB NVMe SSD"; }
            if (budget >= 65000) { cpuTier = 3; gpuTier = 2; ramAmount = 16; storageSpec = "1TB NVMe High-Speed Matrix"; }
            if (budget >= 80000) { cpuTier = 3; gpuTier = 3; ramAmount = 32; storageSpec = "1TB NVMe + 2TB Secondary Vault"; }

            if (role === "Gaming" && budget < 65000 && budget >= 40000) {
                gpuTier = 3; 
                cpuTier = 2;
            } else if (role === "Editing") {
                ramAmount = Math.max(ramAmount, 16); 
            }

            if (enforceRamRule && ramAmount === 12) {
                ramAmount = 16; 
            }

            let cpuName = cpuTier === 1 ? "Intel Core i3 Platform Processor" : (cpuTier === 2 ? "Intel Core i5 Processing Node" : "Intel Core i7 Enterprise Engine");
            let gpuName = gpuTier === 1 ? "Integrated Intel HD Graphics Architecture" : (gpuTier === 2 ? "AMD Radeon RX 580 (8GB GDDR5 Video Core)" : "NVIDIA RTX High-Performance Shader Node");

            document.getElementById('component-specs-output').innerHTML = `
                <div class="spec-item"><span class="spec-label">CPU System Core</span><span class="spec-value">${cpuName}</span></div>
                <div class="spec-item"><span class="spec-label">Graphics Controller Array</span><span class="spec-value">${gpuName}</span></div>
                <div class="spec-item"><span class="spec-label">System Memory Allocator</span><span class="spec-value">${ramAmount} GB Dual-Channel Allocation</span></div>
                <div class="spec-item"><span class="spec-label">Primary Drive Matrix</span><span class="spec-value">${storageSpec}</span></div>
            `;

            let diff = cpuTier - gpuTier;
            let meterFill = document.getElementById('bottleneck-meter');
            let meterText = document.getElementById('bottleneck-text');

            if (diff < -1) {
                meterFill.style.width = "85%"; meterFill.style.backgroundColor = "#ef4444";
                meterText.innerText = "🚨 CRITICAL BOTTLENECK: CPU Throttling Graphics Engine Flow";
            } else if (diff > 1) {
                meterFill.style.width = "70%"; meterFill.style.backgroundColor = "#f59e0b";
                meterText.innerText = "⚠️ SYSTEM MISMATCH: GPU Pipeline Underutilizing CPU Core Capacity";
            } else {
                meterFill.style.width = "100%"; meterFill.style.backgroundColor = "#10b981";
                meterText.innerText = "⚡ ARCHITECTURAL HARMONY: Balanced Hardware Configuration Profile";
            }

            let profileModifier = gpuTier * 32 + cpuTier * 12;
            if (role === "Gaming") profileModifier += 15;
            
            document.getElementById('fps-tomb').innerText = `${Math.round(profileModifier * 1.1)} FPS`;
            document.getElementById('fps-crysis').innerText = `${Math.round(profileModifier * 0.72)} FPS`;
        }

        // ==========================================
        // TAB 2 ENGINE LOGIC: WAREHOUSE ACQUISITIONS & CART
        // ==========================================
        
        // OPTIMIZATION 2 & 3: DOM Batching combined with Image Lazy Loading
        function renderMarketplace(itemsArray) {
            let elementContainer = document.getElementById('market-grid-display');
            let massiveHtmlString = ""; // Cache string in memory instead of heavy multiple updates

            itemsArray.forEach((item) => {
                massiveHtmlString += `
                    <div class="market-card">
                        <img src="${item.img}" loading="lazy" alt="Hardware Block">
                        <h3>${item.title}</h3>
                        <p>₹${item.price.toLocaleString('en-IN')}</p>
                        <div style="font-size:11px; margin-bottom:10px; color:${item.stocks > 2 ? '#34d399' : '#f87171'}">Available Units: ${item.stocks}</div>
                        <button class="btn-action" onclick="addToAcquisitionBuffer('${item.id}')" ${item.stocks === 0 ? 'disabled style="background:#334155;"' : ''}>
                            ${item.stocks === 0 ? 'Out of Stock' : 'Route to Buffer'}
                        </button>
                    </div>
                `;
            });
            
            elementContainer.innerHTML = massiveHtmlString; // Single optimized paint execution
        }

        // OPTIMIZATION 4: High-Performance Search Bar Debouncer Logic
        document.getElementById('market-search').addEventListener('input', (e) => {
            clearTimeout(searchTimeout); // Reset clock bounds on keystroke
            
            searchTimeout = setTimeout(() => {
                let query = e.target.value.toLowerCase().trim();
                
                // Filter the local fast array cache instantly
                let filteredItems = localMarketItemsCache.filter(item => 
                    item.title.toLowerCase().includes(query)
                );
                
                renderMarketplace(filteredItems); // Paint filtered outputs safely
            }, 300); // 300ms pause configuration
        });

        function addToAcquisitionBuffer(itemId) {
            let targetedProduct = localMarketItemsCache.find(p => p.id === itemId);
            if (targetedProduct && targetedProduct.stocks > 0) {
                cart.push({ itemId: targetedProduct.id, title: targetedProduct.title, price: targetedProduct.price });
                updateCartInterface();
            }
        }

        function updateCartInterface() {
            let listElement = document.getElementById('cart-items-list');
            if (cart.length === 0) {
                listElement.innerHTML = "Your pipeline buffer is currently empty.";
                document.getElementById('cart-total-display').innerText = "₹0";
                return;
            }

            let internalTreeStr = "";
            
            // OPTIMIZATION 5: High-speed native JavaScript .reduce() pattern array math calculations
            let costSum = cart.reduce((sum, element) => sum + element.price, 0);

            cart.forEach((element, index) => {
                internalTreeStr += `<div style="display:flex; justify-content:between; margin-bottom:6px;">
                    <span style="flex-grow:1;">🔹 ${element.title}</span>
                    <span style="color:#38bdf8; margin-right:15px;">₹${element.price}</span>
                    <span style="color:#ef4444; cursor:pointer;" onclick="removeFromBuffer(${index})">[❌]</span>
                </div>`;
            });

            listElement.innerHTML = internalTreeStr;
            document.getElementById('cart-total-display').innerText = `₹${costSum.toLocaleString('en-IN')}`;
        }

        function removeFromBuffer(indexPosition) {
            cart.splice(indexPosition, 1);
            updateCartInterface();
        }

        // ==========================================
        // SECURE ROUTED PAYMENT INTEGRATION CONTROLLER
        // ==========================================
        function checkoutTerminal() {
            if(cart.length === 0) return;
            
            let totalCost = cart.reduce((acc, current) => acc + current.price, 0);
            let orderId = "ORD_" + Date.now();
            
            database.ref('system_settings').once('value', (snapshot) => {
                let systemData = snapshot.val() || { target_gpay_number: "+91 9876543210", gpay_name: "TAMIL NADU GRAMA BANK MANAGER" };
                
                let gpayNumber = systemData.target_gpay_number;
                let gpayAccountName = systemData.gpay_name;

                let itemsPayload = cart.map(c => ({ itemId: c.itemId, title: c.title }));
                database.ref(`marketplace/orders/${orderId}`).set({
                    orderType: "Secure Gateway Checkout Setup",
                    invoiceCost: totalCost,
                    purchasedItemsArray: itemsPayload,
                    paymentStatus: "Pending External Manual Cross-Check Validation Verification",
                    timestamp: Date.now()
                });

                let paymentWindow = window.open("", "GPay Transfer Matrix Terminal", "width=440,height=580");
                paymentWindow.document.write(`
                    <html lang="en">
                    <head><title>Secure Verification Gateway Node</title></head>
                    <body style="text-align:center; font-family:sans-serif; background:#020617; color:#f1f5f9; padding:25px 15px; margin:0;">
                        <div style="border: 1px dashed #0096ff; padding: 20px; border-radius: 16px; max-width: 370px; margin: 0 auto; background: #0f172a; box-sizing:border-box; box-shadow:0 0 15px rgba(0,142,255,0.2);">
                            <h3 style="text-transform:uppercase; color:#0096ff; margin-top:0; letter-spacing:1px;">📱 UPI Routing Gateway</h3>
                            <p style="font-size:12px; color:#94a3b8; margin-bottom:15px;">Route transaction funds directly through the banking network interface.</p>
                            
                            <div style="background:rgba(0,150,255,0.05); border:1px solid #0096ff; padding:15px; border-radius:10px; margin-bottom:15px;">
                                <span style="font-size:11px; color:#64748b; display:block; text-transform:uppercase;">Invoice Total Cost Due</span>
                                <h2 style="margin:5px 0; color:#fff; font-size:32px;">₹${totalCost.toLocaleString('en-IN')}</h2>
                                <span style="font-size:14px; color:#fff; background:#020617; padding:5px 10px; border-radius:4px; display:inline-block; font-family:monospace; margin-top:5px; border:1px solid #1e293b;">${gpayNumber}</span>
                            </div>

                            <div style="background: rgba(245,158,11,0.05); border: 1px solid #f59e0b; padding: 11px; border-radius: 8px; font-size: 11px; color: #fbbf24; margin-bottom: 15px; text-align: left; line-height:1.4;">
                                ⚠️ <b>Verification Routing Note:</b> GPay user directory endpoint will register legal name matches as: <b>"${gpayAccountName}"</b>. Verify bank ledger data corresponds before submitting PIN profile values.
                            </div>

                            <div style="text-align:left; font-size:12px; color:#cbd5e1; margin-bottom:12px;">
                                <span style="color:#0096ff; font-weight:bold; display:block; margin-bottom:4px;">Validation Steps:</span>
                                Copy the 12-digit UPI Ref No. / Bank Transaction ID string from your GPay app historical balance sheet and enter below:
                            </div>

                            <input type="text" id="userTxnRef" placeholder="Paste 12-Digit Reference ID" style="width:100%; padding:10px; background:#020617; border:1px solid #1e293b; color:#fff; border-radius:6px; margin-bottom:15px; font-family:monospace; text-align:center;">
                            
                            <button onclick="window.opener.confirmManualGPayPayment('${orderId}', document.getElementById('userTxnRef').value)" style="width:100%; background:#00cc44; color:black; border:none; padding:12px; border-radius:6px; font-weight:bold; font-size:13px; text-transform:uppercase; cursor:pointer;">Submit Code for Verification</button>
                        </div>
                    </body>
                    </html>
                `);
            });
        }

        window.confirmManualGPayPayment = function(orderId, txnReferenceCode) {
            if(txnReferenceCode.trim().length < 6) {
                alert("Security Verification Rejected: Input format string token invalid.");
                return;
            }

            database.ref(`marketplace/orders/${orderId}`).update({
                paymentStatus: "Payment Logged: Verification Pending Cross-Reference Check",
                transactionIDProof: txnReferenceCode
            });

            cart.forEach(cartItem => {
                let warehouseElement = localMarketItemsCache.find(p => p.id === cartItem.itemId);
                if(warehouseElement) {
                    warehouseElement.stocks = Math.max(0, warehouseElement.stocks - 1);
                }
            });

            cart = [];
            updateCartInterface();
            renderMarketplace(localMarketItemsCache);
            
            alert("✨ Transaction Verification Code logged securely to Pipeline HQ. Your order parameters are buffered safely pending back-end manual checking clearance pools.");
        };

        // Application Execution Initializer Hooks
        window.onload = function() {
            syncDatabaseCatalog(); // Pull updates from database once to set cache
            runOptimizationEngine();
            renderMarketplace(localMarketItemsCache);
        };
    </script>
</body>
</html>
